# Dokumentation af projektets Hermes-konfiguration.
# Den rigtige config lever i ~/.hermes/config.yaml og læses af Hermes ved opstart.
# API-nøgler og personlige indstillinger er ikke inkluderet her.

# LLM — gemini-2.5-flash via Google AI Studio (Tier 1 Pay-as-you-go)
# ~/.hermes/config.yaml linje 1-4
model:
  default: gemini-2.5-flash          # model der bruges til alle kald
  provider: gemini                   # Google Gemini som udbyder
  base_url: https://generativelanguage.googleapis.com/v1beta  # Googles API-endpoint

# Agent-indstillinger
# ~/.hermes/config.yaml linje 10-24
agent:
  system_prompt: hermes/system_prompt.md  # absolut sti i den rigtige config — definerer agentens rolle og tool-strategi
  reasoning_effort: medium                # hvor meget LLM'en "tænker" inden svar — medium er balance mellem kvalitet og hastighed
  max_turns: 60                           # maks antal tool-kald i én samtale inden Hermes stopper

# MCP-server — Hermes forbinder via Streamable HTTP (/mcp), ikke SSE
# ~/.hermes/config.yaml linje 484-487
mcp_servers:
  plotplanner:
    url: http://localhost:3000/mcp  # adressen på den lokale MCP-server
    enabled: true                   # MCP-serveren er aktiv

# Display-indstillinger
# ~/.hermes/config.yaml linje 229-231
display:
  personality: helpful  # aktiv personality — Hermes svarer som en hjælpsom, venlig assistent

# Telegram-gateway — Hermes håndterer Telegram nativt
# ~/.hermes/config.yaml linje 375-378
telegram:
  reactions: false    # Hermes reagerer ikke med emoji-reaktioner på beskeder
  allowed_chats: ''   # tom = alle chats er tilladt, kan begrænses til specifikke chat-ID'er
